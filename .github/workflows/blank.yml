name: Deploy Website

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy Website

      run: |
        Copy-Item `
        index.html `
        C:\inetpub\wwwroot\index.html `
        -Force
